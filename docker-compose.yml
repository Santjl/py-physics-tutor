services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quiz_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quiz_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    environment:
      APP_ENV: dev
      PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/quiz_db
      SECRET_KEY: change-this-secret-key
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-google}
      RETRIEVAL_PROVIDER: ${RETRIEVAL_PROVIDER:-google}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY:-}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT_ID:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-global}
      GOOGLE_DISCOVERY_ENGINE_ID: ${GOOGLE_DISCOVERY_ENGINE_ID:-}
      GOOGLE_DISCOVERY_DATA_STORE_ID: ${GOOGLE_DISCOVERY_DATA_STORE_ID:-}
      GOOGLE_DISCOVERY_SERVING_CONFIG: ${GOOGLE_DISCOVERY_SERVING_CONFIG:-default_search}
      GOOGLE_APPLICATION_CREDENTIALS: /home/appuser/.config/gcloud/application_default_credentials.json
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ${GCLOUD_ADC_PATH:?Set GCLOUD_ADC_PATH to your application_default_credentials.json path}:/home/appuser/.config/gcloud/application_default_credentials.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  migrations:
    build: .
    command: ["sh", "-c", "alembic upgrade head"]
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/quiz_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    restart: "no"

  adminer:
    image: adminer:4.8.1
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata: {}
